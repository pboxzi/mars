services:
  - type: web
    name: bruno-mars-vip-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
      - key: DB_NAME
        value: bruno_mars_vip
      - key: MONGO_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: DEFAULT_ADMIN_EMAIL
        sync: false
      - key: DEFAULT_ADMIN_PASSWORD
        sync: false
      - key: ADMIN_SETUP_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: SENDER_EMAIL
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: SUPPORT_PHONE
        sync: false
      - key: SUPPORT_WHATSAPP
        sync: false
      - key: SUPPORT_INSTAGRAM
        sync: false
      - key: SUPPORT_HOURS
        sync: false
